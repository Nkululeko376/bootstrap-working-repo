<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Nkululeko Learning Bootsrap.</title>
  </head>
  <body>
    <div class="container-lg my-5">
      <h2>basic grid.</h2>
      <div class="row">
        <div class="mb-2">
          <div class="p-5 bg-success text-light">Column1</div>
        </div>
        <div class="mb-2">
          <div class="p-5 bg-success text-light">Column2</div>
        </div>
        <div class="mb-2">
          <div class="p-5 bg-success text-light">Column3</div>
        </div>
      </div>
    </div>

    <div class="container-lg my-5">
      <h2>column widths.</h2>
      <div class="row">
        <div class="mb-2 col">
          <div class="p-5 bg-success text-light">Column1</div>
        </div>
        <div class="mb-2 col">
          <div class="p-5 bg-success text-light">Column2</div>
        </div>
        <div class="mb-2 col">
          <div class="p-5 bg-success text-light">Column3</div>
        </div>
      </div>
    </div>

    <div class="container-lg my-5">
      <h2>responsive column widths.</h2>
      <div class="row">
        <div class="mb-2 col-sm-12 col-md-4 col-lg-6 col-xl-9">
          <div class="p-5 bg-success text-light">Column1</div>
        </div>
        <div class="mb-2 col-sm-12 col-md-4 col-lg-3 col-xl-1">
          <div class="p-5 bg-success text-light">Column2</div>
        </div>
        <div class="mb-2 col-sm-12 col-md-4 col-lg-3 col-xl-2">
          <div class="p-5 bg-success text-light">Column3</div>
        </div>
      </div>
    </div>

    <div class="container-lg my-5">
      <h2>justifying columns.</h2>
      <div class="row justify-content-center align-items-center">
        <div class="mb-2 col-3">
          <div class="p-5 bg-success text-light text-center">Column1</div>
        </div>
        <div class="mb-2 col-3">
          <div class="p-5 bg-success text-light text-end">Column2</div>
        </div>
        <div class="mb-2 col-3">
          <div class="p-5 bg-success text-light text-top">Column3</div>
        </div>
      </div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
