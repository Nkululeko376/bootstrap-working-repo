<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Nkululeko Learning Bootsrap.</title>
  </head>
  <body>
    <!-- ==== Basic buttons ====== -->
    <h2>buttons</h2>
    <button class="btn btn-primary">primary button</button>
    <button class="btn btn-secondary">secondary button</button>
    <button class="btn btn-danger">danger button</button>
    <button class="btn btn-warning">warning button</button>
    <button class="btn btn-light">light button</button>
    <button class="btn btn-dark">dark button</button>
    <button class="btn btn-info">info button</button>
    <button class="btn btn-success">success button</button>

    <!-- ========= Anchor tags as buttons ========= -->
    <h2>Links as buttons</h2>

    <a href="#" class="btn btn-info">info anchor</a>
    <a href="#" class="btn btn-success">success anchor</a>
    <a href="#" class="btn btn-warning">warning anchor</a>
    <a href="#" class="btn btn-danger">danger ancher</a>

    <!-- ======= Button sizes ============= -->
    <h2>Button sizes</h2>
    <button class="btn btn-sm btn-secondary">small button</button>
    <button class="btn btn-md btn-secondary">medium button</button>
    <button class="btn btn-lg btn-secondary">large button</button>
    <!-- ======= Outlined styles ============== -->
    <h2>Button styles</h2>
    <button class="btn btn-sm btn-outline-primary">
      outline primary button
    </button>
    <button class="btn btn-lg btn-outline-secondary">
      outline secondary button
    </button>
    <button class="btn btn-sm btn-outline-danger">outline danger button</button>
    <button class="btn btn-lg btn-outline-warning">
      outline warning button
    </button>
    <button class="btn btn-sm btn-outline-light">outline light button</button>
    <button class="btn btn-lg btn-outline-dark">outline dark button</button>
    <button class="btn btn-sm btn-outline-info">outline info button</button>
    <button class="btn btn-lg btn-outline-success">
      outline success button
    </button>

    <!-- ======== Button groups -->
    <h2>Button groups</h2>
    <div class="btn-group">
      <a href="#" class="btn btn-outline-success">button 1</a>
      <a href="#" class="btn btn-outline-success">button 2</a>
      <a href="#" class="btn btn-outline-success">button 3</a>
      <a href="#" class="btn btn-outline-success">button 4</a>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->
    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
